apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-docker-timefreeze
  labels:
    app: node-docker-timefreeze
spec:
  replicas: 1
  selector:
    matchLabels:
      app: node-docker-timefreeze
  template:
    metadata:
      labels:
        app: node-docker-timefreeze
    spec:
      terminationGracePeriodSeconds: 10
      containers:
        - name: node-docker-timefreeze
          image: node-docker-timefreeze:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: PORT
              value: "8080"
            - name: JWT_KEY
              value: "my_super_secret_key"
            - name: JWT_USERNAME
              value: "testuser"
            - name: JWT_TTL_SECONDS
              value: "10"
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 30
            periodSeconds: 2
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
