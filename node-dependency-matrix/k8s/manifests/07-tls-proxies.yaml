apiVersion: v1
kind: List
items:
  - apiVersion: v1
    kind: Service
    metadata:
      name: mysql-tls
    spec:
      selector:
        app: mysql-tls
      ports:
        - name: mysql
          port: 3306
          targetPort: 3306
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: mysql-tls
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: mysql-tls
      template:
        metadata:
          labels:
            app: mysql-tls
        spec:
          containers:
            - name: mysql-tls
              image: node-dependency-matrix:latest
              imagePullPolicy: IfNotPresent
              command: ["node", "dist/bin/tlsProxy.js"]
              env:
                - name: LISTEN_PORT
                  value: "3306"
                - name: TARGET_HOST
                  value: mysql
                - name: TARGET_PORT
                  value: "3306"
                - name: TLS_CERT_PATH
                  value: /etc/sample-certs/proxy.crt
                - name: TLS_KEY_PATH
                  value: /etc/sample-certs/proxy.key
              volumeMounts:
                - name: sample-tls
                  mountPath: /etc/sample-certs
                  readOnly: true
          volumes:
            - name: sample-tls
              secret:
                secretName: node-dependency-matrix-tls
