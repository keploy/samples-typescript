apiVersion: v1
kind: ConfigMap
metadata:
  name: localstack-init-scripts
data:
  01-create-queue.sh: |
    #!/bin/sh
    set -eu
    awslocal sqs create-queue --queue-name dependency-matrix >/dev/null 2>&1 || true
---
apiVersion: v1
kind: Service
metadata:
  name: localstack
spec:
  selector:
    app: localstack
  ports:
    - name: edge
      port: 4566
      targetPort: 4566
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: localstack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: localstack
  template:
    metadata:
      labels:
        app: localstack
    spec:
      containers:
        - name: localstack
          image: localstack/localstack:3.3
          env:
            - name: SERVICES
              value: sqs
            - name: AWS_DEFAULT_REGION
              value: us-east-1
          ports:
            - containerPort: 4566
          volumeMounts:
            - name: init-scripts
              mountPath: /etc/localstack/init/ready.d
      volumes:
        - name: init-scripts
          configMap:
            name: localstack-init-scripts
            defaultMode: 0755
